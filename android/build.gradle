group 'com.preciosai.photo_capture_plugin'
version '1.0'

buildscript {
    ext.kotlin_version = "2.1.0"
    repositories {
        google()
        mavenCentral()
        maven { url "https://plugins.gradle.org/m2/" }
    }

    dependencies {
        classpath("com.android.tools.build:gradle:8.9.1")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version")
        classpath("org.jlleitschuh.gradle:ktlint-gradle:14.0.1")
    }
}

allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

apply plugin: "com.android.library"
apply plugin: "kotlin-android"
apply plugin: "org.jlleitschuh.gradle.ktlint"
apply plugin: 'org.jetbrains.kotlin.plugin.serialization'

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterRoot = localProperties.getProperty('flutter.sdk')
if (flutterRoot == null) {
    flutterRoot = System.getenv('FLUTTER_ROOT')
}

android {
    namespace = "com.preciosai.photo_capture_plugin"
    compileSdk = 35

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
    }
    packagingOptions {
        pickFirst "**/libc++_shared.so"
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_17.toString()
    }

    java {
        toolchain {
            languageVersion = JavaLanguageVersion.of(17)
        }
    }

    sourceSets {
        main.java.srcDirs += "src/main/kotlin"
        test.java.srcDirs += "src/test/kotlin"
    }

    defaultConfig {
        minSdk = 21
        
        // Native library build configuration
        externalNativeBuild {
            cmake {
                cppFlags ""
                arguments "-DANDROID_STL=c++_shared"
            }
        }

        // Supported ABIs
        ndk {
            abiFilters "armeabi-v7a", "arm64-v8a", "x86", "x86_64"
        }
    }
    
    // CMake build configuration
    externalNativeBuild {
        cmake {
            path "src/main/cpp/CMakeLists.txt"
        }
    }

    dependencies {
        if (flutterRoot) {
            compileOnly files("$flutterRoot/bin/cache/artifacts/engine/android-arm/flutter.jar")
            compileOnly files("$flutterRoot/bin/cache/artifacts/engine/android-arm64/flutter.jar") 
            compileOnly files("$flutterRoot/bin/cache/artifacts/engine/android-x86/flutter.jar")
            compileOnly files("$flutterRoot/bin/cache/artifacts/engine/android-x64/flutter.jar")
        } else {
            compileOnly 'io.flutter:flutter_embedding_release:1.0.0-ee76268252c22f5c11e82a7b87423ca3982e51a7'
        }
        
        implementation("com.google.ai.edge.litert:litert:1.2.0")
        implementation("com.google.ai.edge.litert:litert-gpu:1.2.0")
        implementation('com.google.ai.edge.litert:litert-support-api:1.2.0')
        implementation('com.google.ai.edge.litert:litert-metadata:1.2.0')
        implementation("org.yaml:snakeyaml:1.29")

        implementation("androidx.camera:camera-core:1.5.2")
        implementation("androidx.camera:camera-camera2:1.5.2")
        implementation("androidx.camera:camera-lifecycle:1.5.2")
        implementation("androidx.camera:camera-view:1.5.2")
        implementation("androidx.camera:camera-extensions:1.5.2")

        implementation("androidx.core:core-ktx:1.10.1")
        implementation("androidx.appcompat:appcompat:1.6.1")

        implementation("org.pytorch:executorch-android:0.7.0")
        implementation("com.airbnb.android:lottie:6.7.1")
        implementation("androidx.appcompat:appcompat:1.7.0")
        implementation("org.opencv:opencv:4.12.0")
        implementation("androidx.concurrent:concurrent-futures-ktx:1.2.0")
        implementation("org.jetbrains.kotlinx:kotlinx-serialization-json:1.6.0")

        implementation("com.google.mediapipe:tasks-vision:0.10.32")
    }
}

ktlint {
    android.set(true)              // стиль Android
    outputToConsole.set(true)      // вывод в консоль
    ignoreFailures.set(false)      // фейл сборки при нарушении
    reporters {
        reporter "plain"
        reporter "checkstyle"
    }
    filter {
        exclude("**/generated/**") // исключаем сгенерированные файлы
        include("**/kotlin/**")
    }
}